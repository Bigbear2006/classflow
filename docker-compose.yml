services:
  db:
    image: postgres:17.4
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - backend/.env

  redis:
    image: redis:8.6
    command: >
      sh -c "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD"
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    env_file:
      - backend/.env

  backend:
    build:
      context: backend
    restart: always
    entrypoint: /app/entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: frontend
    volumes:
      - ./build:/app/dist

  nginx:
    build:
      context: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./build:/var/www/build
      - ./nginx/ssl:/etc/ssl
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v3.11.3
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:13.0.1
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    env_file:
      - backend/.env
    environment:
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_SERVER_PROTOCOL=http
      - GF_SERVER_DOMAIN=localhost
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
