services:
  db:
    image: postgres:17.4
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data
    env_file:
      - backend/.env

  backend:
    build:
      context: backend
    restart: always
    entrypoint: /app/entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: frontend
    volumes:
      - ./build:/app/dist

  nginx:
    build:
      context: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./build:/var/www/build
      - ./nginx/ssl:/etc/ssl
    depends_on:
      - backend